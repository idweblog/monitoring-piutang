<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="vaultGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <filter id="vaultShadow">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#047857" flood-opacity="0.25" />
    </filter>
  </defs>
  <!-- Background Canvas -->
  <rect width="512" height="512" rx="128" fill="#1e293b" />
  <g filter="url(#vaultShadow)">
    <!-- Outer concentric circular track -->
    <circle cx="256" cy="256" r="140" fill="none" stroke="url(#vaultGrad)" stroke-width="20" />
    <!-- Outer lock tabs -->
    <circle cx="256" cy="116" r="14" fill="url(#goldGrad)" />
    <circle cx="256" cy="396" r="14" fill="url(#goldGrad)" />
    <circle cx="116" cy="256" r="14" fill="url(#goldGrad)" />
    <circle cx="396" cy="256" r="14" fill="url(#goldGrad)" />
    <!-- Core Vault Dial -->
    <circle cx="256" cy="256" r="85" fill="#0f172a" stroke="url(#goldGrad)" stroke-width="10" />
    <!-- Dial notches -->
    <path d="M256 195 V210 M256 302 V317 M195 256 H210 M302 256 H317" stroke="#fbbf24" stroke-width="6" stroke-linecap="round" />
    <!-- Center Bolt Handle shape -->
    <path d="M226 256 H286 M256 226 V286" stroke="url(#vaultGrad)" stroke-width="12" stroke-linecap="round" />
    <circle cx="256" cy="256" r="22" fill="url(#goldGrad)" />
    <circle cx="256" cy="256" r="8" fill="#0f172a" />
  </g>
</svg>
