<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="growthGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="60%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <filter id="premiumGlue" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#4f46e5" flood-opacity="0.22" />
    </filter>
  </defs>
  <!-- Background Rounded Canvas -->
  <rect width="512" height="512" rx="128" fill="#0f172a" />
  <g filter="url(#premiumGlue)">
    <!-- Base Shield Protection Circle -->
    <circle cx="256" cy="256" r="150" fill="none" stroke="url(#growthGrad)" stroke-width="24" stroke-dasharray="8 8" opacity="0.4" />
    <!-- Rising Chart Path -->
    <path d="M160 340 L220 280 L280 310 L360 200" fill="none" stroke="url(#growthGrad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Accent Circle on Chart Peak -->
    <circle cx="360" cy="200" r="28" fill="#10b981" stroke="#0f172a" stroke-width="8" />
    <!-- Dynamic Cash Flow Ribbon -->
    <path d="M140 310 C 180 230, 300 320, 360 210" fill="none" stroke="url(#growthGrad)" stroke-width="12" stroke-linecap="round" opacity="0.75" />
    <!-- Geometric Wallet / Safeguard lock center symbol -->
    <path d="M236 210 H276 V240 C276 250, 266 260, 256 260 C246 260, 236 250, 236 240 Z" fill="url(#growthGrad)" />
    <circle cx="256" cy="230" r="5" fill="#0f172a" />
  </g>
</svg>
